<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.85rem; }
    .score-box .val   { font-size: 1.8rem; font-weight: 900; }
    #score-x .val { color: #e94560; }
    #score-o .val { color: #a8dadc; }
    #score-d .val { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box" id="score-x">
      <div class="label">X</div>
      <div class="val" id="x-count">0</div>
    </div>
    <div class="score-box" id="score-d">
      <div class="label">Draws</div>
      <div class="val" id="d-count">0</div>
    </div>
    <div class="score-box" id="score-o">
      <div class="label">O</div>
      <div class="val" id="o-count">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores = {X:0, O:0, D:0};

    const cells  = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xCount = document.getElementById('x-count');
    const oCount = document.getElementById('o-count');
    const dCount = document.getElementById('d-count');

    function init() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          gameOver = true;
          win.forEach(j => cells[j].classList.add('win'));
          status.textContent = `${current} wins! 🎉`;
          scores[current]++;
          updateScores();
        } else if (board.every(Boolean)) {
          gameOver = true;
          status.textContent = "It's a draw!";
          scores.D++;
          updateScores();
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    function updateScores() {
      xCount.textContent = scores.X;
      oCount.textContent = scores.O;
      dCount.textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
